version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres-medical
    environment:
      POSTGRES_DB: medicaldb
      POSTGRES_USER: medicaluser
      POSTGRES_PASSWORD: medicalpass123
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    restart: unless-stopped

  web:
    build: .
    container_name: medical-app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: medicaldb
      DATABASE_USER: medicaluser
      DATABASE_PASSWORD: medicalpass123
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
