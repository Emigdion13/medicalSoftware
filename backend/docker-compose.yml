services:
  db:
    image: postgres:15-alpine
    container_name: postgres-medical
    environment:
      POSTGRES_DB: medicaldb
      POSTGRES_USER: medicaluser
      POSTGRES_PASSWORD: medicalpass123
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medicaluser -d medicaldb"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: medical-app
    command: >
      sh -c "
        until pg_isready -h db -p 5432 -U medicaluser; do
          echo 'Waiting for PostgreSQL...';
          sleep 2;
        done &&
        python manage.py migrate --noinput &&
        python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    environment:
      DATABASE_HOST: postgres-medical
      DATABASE_PORT: 5432
      DATABASE_NAME: medicaldb
      DATABASE_USER: medicaluser
      DATABASE_PASSWORD: medicalpass123
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: medical-frontend
    ports:
      - "3000:80"
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
